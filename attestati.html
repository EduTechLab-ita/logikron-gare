<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attestati – LogiKron</title>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <style>
    :root {
      --lk-bg: #0f172a;
      --lk-surface: #1e293b;
      --lk-border: #334155;
      --lk-primary: #6366f1;
      --lk-accent: #7c3aed;
      --lk-text: #e2e8f0;
      --lk-text-muted: #94a3b8;
      --lk-success: #10b981;
      --lk-warning: #f59e0b;
      --lk-gold: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--lk-bg); color: var(--lk-text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }

    /* Header */
    .page-header {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 0 1.5rem; border-bottom: 1px solid var(--lk-border); margin-bottom: 1.5rem;
    }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    .page-header h1 span { color: var(--lk-primary); }
    .back-btn {
      margin-left: auto; background: transparent; border: 1px solid var(--lk-border);
      color: var(--lk-text-muted); padding: 0.4rem 1rem; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; text-decoration: none;
    }
    .back-btn:hover { border-color: var(--lk-primary); color: var(--lk-text); }

    /* Login */
    .login-box {
      max-width: 380px; margin: 120px auto; background: var(--lk-surface);
      border: 1px solid var(--lk-border); border-radius: 16px; padding: 2rem; text-align: center;
    }
    .login-box h2 { margin-bottom: 0.5rem; }
    .login-box p { color: var(--lk-text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .login-input {
      width: 100%; padding: 0.7rem 1rem; background: #0f172a; border: 1px solid var(--lk-border);
      border-radius: 8px; color: var(--lk-text); font-size: 1rem; margin-bottom: 0.75rem;
    }
    .login-input:focus { outline: none; border-color: var(--lk-primary); }
    .login-error { color: #f87171; font-size: 0.85rem; margin-bottom: 0.75rem; display: none; }

    /* Bottoni */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; border: none; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, var(--lk-primary), var(--lk-accent)); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--lk-border); color: var(--lk-text); }
    .btn-gold { background: linear-gradient(135deg, #b45309, var(--lk-gold)); color: #1c1917; }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }
    .btn-block { width: 100%; justify-content: center; }

    /* Card configurazione */
    .card {
      background: var(--lk-surface); border: 1px solid var(--lk-border);
      border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem;
    }
    .card-title { font-size: 0.85rem; font-weight: 700; color: var(--lk-text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.8rem; color: var(--lk-text-muted); }
    .form-input {
      padding: 0.6rem 0.8rem; background: #0f172a; border: 1px solid var(--lk-border);
      border-radius: 8px; color: var(--lk-text); font-size: 0.9rem;
    }
    .form-input:focus { outline: none; border-color: var(--lk-primary); }

    /* Squadre */
    .squadre-header {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;
    }
    .squadre-count { font-size: 0.85rem; color: var(--lk-text-muted); }

    .squadra-block {
      background: var(--lk-surface); border: 1px solid var(--lk-border);
      border-radius: 12px; margin-bottom: 0.75rem; overflow: hidden;
    }
    .squadra-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1.1rem; cursor: pointer; user-select: none;
    }
    .squadra-header:hover { background: rgba(255,255,255,0.03); }
    .pos-badge {
      width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
    }
    .pos-1 { background: linear-gradient(135deg, #b45309, #fbbf24); color: #1c1917; }
    .pos-other { background: var(--lk-border); color: var(--lk-text-muted); }
    .squadra-nome { font-weight: 600; font-size: 0.95rem; }
    .att-badge {
      font-size: 0.75rem; padding: 0.2rem 0.65rem; border-radius: 999px; font-weight: 600;
    }
    .att-merito { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .att-partecipazione { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
    .squadra-info { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
    .n-alunni { font-size: 0.8rem; color: var(--lk-text-muted); }
    .chevron { font-size: 0.7rem; color: var(--lk-text-muted); transition: transform 0.2s; }
    .squadra-block.open .chevron { transform: rotate(180deg); }

    .alunni-list { border-top: 1px solid var(--lk-border); display: none; }
    .squadra-block.open .alunni-list { display: block; }
    .alunno-row {
      display: flex; align-items: center; padding: 0.6rem 1.1rem 0.6rem 1.5rem;
      border-bottom: 1px solid rgba(51,65,85,0.5); gap: 0.75rem;
    }
    .alunno-row:last-child { border-bottom: none; }
    .alunno-nome { flex: 1; font-size: 0.9rem; }
    .alunno-tipo { font-size: 0.75rem; color: var(--lk-text-muted); }

    /* Progress PDF */
    .progress-bar-wrap {
      background: #0f172a; border-radius: 999px; height: 6px; overflow: hidden; margin: 0.5rem 0;
    }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--lk-primary), var(--lk-accent)); transition: width 0.3s; }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--lk-surface); border: 1px solid var(--lk-border);
      border-radius: 10px; padding: 1rem 1.25rem; z-index: 9999;
      font-size: 0.9rem; max-width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    #loadingMsg { text-align: center; color: var(--lk-text-muted); padding: 3rem; display: none; }
    #emptyMsg { text-align: center; color: var(--lk-text-muted); padding: 2rem; display: none; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPanel">
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:0.75rem;">📜</div>
    <h2>Genera Attestati</h2>
    <p>LogiKron – Area Riservata</p>
    <input id="loginPwd" type="password" class="login-input" placeholder="Password admin"
           onkeypress="if(event.key==='Enter') doLogin()">
    <div id="loginError" class="login-error">Password non corretta</div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Accedi</button>
  </div>
</div>

<!-- MAIN PANEL -->
<div id="mainPanel" style="display:none;">
  <div class="container">

    <div class="page-header">
      <span style="font-size:1.5rem;">📜</span>
      <h1>Genera <span>Attestati</span></h1>
      <a href="admin.html" class="back-btn">← Admin</a>
    </div>

    <!-- Config -->
    <div class="card">
      <div class="card-title">Configurazione</div>
      <div class="form-row" style="margin-bottom:1rem;">
        <div class="form-group">
          <label>Gara</label>
          <select id="selGara" class="form-input" onchange="onGaraChange()">
            <option value="">— Seleziona gara —</option>
          </select>
        </div>
        <div class="form-group">
          <label>Anno Scolastico</label>
          <input id="annoScolastico" class="form-input" readonly
                 value="" style="opacity:0.6;">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:1rem;">
        <div class="form-group">
          <label>Nome Dirigente Scolastico</label>
          <input id="nomeDS" class="form-input" placeholder="es. Prof.ssa Maria Rossi" oninput="saveConfig()">
        </div>
        <div class="form-group">
          <label>Nome Referente Matematica</label>
          <input id="nomeRef" class="form-input" placeholder="es. Ins. Fabio Rizzotto" oninput="saveConfig()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Data cerimonia</label>
          <input id="dataCerimonia" class="form-input" type="date" oninput="saveConfig()">
        </div>
        <div class="form-group" style="justify-content:flex-end;">
          <button id="btnCarica" class="btn btn-primary" onclick="caricaDati()" disabled>
            📥 Carica dati gara
          </button>
        </div>
      </div>
    </div>

    <!-- Stato caricamento -->
    <div id="loadingMsg">⏳ Caricamento dati in corso...</div>
    <div id="emptyMsg">⚠️ Nessun dato trovato per questa gara.</div>

    <!-- Lista squadre -->
    <div id="squadrePanel" style="display:none;">
      <div class="squadre-header">
        <div>
          <div style="font-weight:700;font-size:1rem;">Squadre e Alunni</div>
          <div id="riepilogoCount" class="squadre-count"></div>
        </div>
        <div style="margin-left:auto;display:flex;gap:0.75rem;align-items:center;">
          <div id="progressWrap" style="display:none;min-width:160px;">
            <div style="font-size:0.75rem;color:var(--lk-text-muted);margin-bottom:2px;" id="progressLabel">Generazione...</div>
            <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
          </div>
          <button class="btn btn-gold" onclick="scaricaTutti()" id="btnTutti">
            ⬇️ Scarica tutti i PDF
          </button>
        </div>
      </div>
      <div id="squadreList"></div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  const ADMIN_PASSWORD = 'logikron2025';
  const API = LOGIKRON_CONFIG.webAppUrls.admin;

  let adminPwd = '';
  let _datiAttest = []; // [{squadra, posizione, tipo, istituto, plesso, ordine, classe, sezione, docente, email, alunni:[]}]
  let _garaNome = '';
  let _imgCache = {}; // { url: base64 }

  // ===================== LOGIN =====================

  function doLogin() {
    const v = document.getElementById('loginPwd').value;
    if (v === ADMIN_PASSWORD) {
      adminPwd = v;
      sessionStorage.setItem('lkAttestati', 'true');
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('mainPanel').style.display = 'block';
      init();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  if (sessionStorage.getItem('lkAttestati') === 'true') {
    adminPwd = ADMIN_PASSWORD;
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('mainPanel').style.display = 'block';
  }

  // ===================== INIT =====================

  function init() {
    document.getElementById('annoScolastico').value = LOGIKRON_CONFIG.annoScolastico;
    loadConfig();
    caricaGare();
    preloadImmagini();
  }

  function loadConfig() {
    const c = JSON.parse(localStorage.getItem('lkAttestatiConfig') || '{}');
    if (c.nomeDS)         document.getElementById('nomeDS').value = c.nomeDS;
    if (c.nomeRef)        document.getElementById('nomeRef').value = c.nomeRef;
    if (c.dataCerimonia)  document.getElementById('dataCerimonia').value = c.dataCerimonia;
  }

  function saveConfig() {
    localStorage.setItem('lkAttestatiConfig', JSON.stringify({
      nomeDS:         document.getElementById('nomeDS').value,
      nomeRef:        document.getElementById('nomeRef').value,
      dataCerimonia:  document.getElementById('dataCerimonia').value
    }));
  }

  // ===================== PRE-CARICA IMMAGINI =====================

  async function preloadImmagini() {
    const imgs = ['sfondo', 'logo-logikron', 'logo-stato', 'timbro'];
    await Promise.all(imgs.map(async function(name) {
      try {
        const url = './assets/attestati/' + name + '.png';
        const resp = await fetch(url);
        const blob = await resp.blob();
        _imgCache[name] = await blobToBase64(blob);
      } catch(e) {
        console.warn('Immagine non caricata:', name, e);
      }
    }));
  }

  function blobToBase64(blob) {
    return new Promise(function(resolve) {
      const r = new FileReader();
      r.onload = function() { resolve(r.result); };
      r.readAsDataURL(blob);
    });
  }

  // ===================== GARE =====================

  function caricaGare() {
    lkApi(API, { action: 'getListaGare' })
      .then(function(gare) {
        const sel = document.getElementById('selGara');
        sel.innerHTML = '<option value="">— Seleziona gara —</option>';
        // Mostra prima le gare terminate
        gare.sort(function(a,b) {
          const ord = { terminata:0, attiva:1, creata:2 };
          return (ord[a.stato]??9) - (ord[b.stato]??9) || (b.oraFine||'').localeCompare(a.oraFine||'');
        });
        gare.forEach(function(g) {
          const opt = document.createElement('option');
          opt.value = g.id;
          const stato = g.stato === 'terminata' ? '✅' : g.stato === 'attiva' ? '🔴' : '⚪';
          opt.textContent = stato + ' ' + g.nome + (g.oraFine ? ' (' + g.oraFine.substring(0,10) + ')' : '');
          sel.appendChild(opt);
        });
        // Auto-seleziona prima terminata
        const prima = gare.find(function(g){ return g.stato === 'terminata'; });
        if (prima) { sel.value = prima.id; onGaraChange(); }
      })
      .catch(function(e){ toast('Errore carica gare: ' + e.message); });
  }

  function onGaraChange() {
    const v = document.getElementById('selGara').value;
    document.getElementById('btnCarica').disabled = !v;
    document.getElementById('squadrePanel').style.display = 'none';
    document.getElementById('emptyMsg').style.display = 'none';
    _datiAttest = [];
  }

  // ===================== CARICA DATI =====================

  function caricaDati() {
    const garaId = document.getElementById('selGara').value;
    if (!garaId) return;

    const selEl = document.getElementById('selGara');
    _garaNome = selEl.options[selEl.selectedIndex].textContent.replace(/^[✅🔴⚪]\s*/,'').split(' (')[0];

    document.getElementById('loadingMsg').style.display = 'block';
    document.getElementById('squadrePanel').style.display = 'none';
    document.getElementById('emptyMsg').style.display = 'none';
    document.getElementById('btnCarica').disabled = true;

    Promise.all([
      lkApi(API, { action: 'getTabellone', garaId: garaId }),
      lkApi(API, { action: 'getIscrizioni', pwd: adminPwd })
    ]).then(function(results) {
      const tabellone = results[0];
      const iscrizioni = results[1];

      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('btnCarica').disabled = false;

      if (!tabellone.squadre || tabellone.squadre.length === 0) {
        document.getElementById('emptyMsg').style.display = 'block';
        return;
      }

      // Mappa iscrizioni per nome squadra
      const iscMap = {};
      (iscrizioni || []).forEach(function(isc) {
        iscMap[isc.nomeSquadra] = isc;
      });

      // Costruisce dati attestati (squadre già ordinate per punti)
      _datiAttest = tabellone.squadre.map(function(sq, idx) {
        const isc = iscMap[sq.nome] || {};
        const studenti = typeof isc.studenti === 'string'
          ? isc.studenti.split(';').map(function(s){ return s.trim(); }).filter(Boolean)
          : [];
        return {
          squadra:   sq.nome,
          posizione: idx + 1,
          punti:     sq.punti,
          tipo:      idx === 0 ? 'Merito' : 'Partecipazione',
          istituto:  isc.istituto || '',
          plesso:    isc.plesso   || '',
          ordine:    isc.ordine   || '',
          classe:    isc.classe   || '',
          sezione:   isc.sezione  || '',
          docente:   isc.docente  || '',
          email:     isc.email    || '',
          alunni:    studenti
        };
      });

      renderSquadre();

    }).catch(function(e) {
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('btnCarica').disabled = false;
      toast('Errore: ' + e.message);
    });
  }

  // ===================== RENDER SQUADRE =====================

  function renderSquadre() {
    const list = document.getElementById('squadreList');
    list.innerHTML = '';

    const totAlunni = _datiAttest.reduce(function(s,sq){ return s + sq.alunni.length; }, 0);
    document.getElementById('riepilogoCount').textContent =
      _datiAttest.length + ' squadre · ' + totAlunni + ' alunni';

    _datiAttest.forEach(function(sq, sqIdx) {
      const block = document.createElement('div');
      block.className = 'squadra-block';
      block.id = 'sq-block-' + sqIdx;

      const posBadge = sq.posizione === 1
        ? '<span class="pos-badge pos-1">' + sq.posizione + '</span>'
        : '<span class="pos-badge pos-other">' + sq.posizione + '</span>';

      const attBadge = sq.tipo === 'Merito'
        ? '<span class="att-badge att-merito">🏆 Merito</span>'
        : '<span class="att-badge att-partecipazione">📜 Partecipazione</span>';

      const infoTxt = [sq.istituto, sq.plesso, sq.ordine === 'primaria' ? 'Primaria' : 'Secondaria', 'Cl. ' + sq.classe + sq.sezione]
        .filter(Boolean).join(' · ');

      block.innerHTML = `
        <div class="squadra-header" onclick="toggleSquadra(${sqIdx})">
          ${posBadge}
          <div>
            <div class="squadra-nome">${_esc(sq.squadra)}</div>
            <div style="font-size:0.75rem;color:var(--lk-text-muted);margin-top:2px;">${_esc(infoTxt)}</div>
          </div>
          ${attBadge}
          <div class="squadra-info">
            <span class="n-alunni">${sq.alunni.length} alunni</span>
            <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();scaricaSquadra(${sqIdx})">⬇️ Tutti</button>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="alunni-list" id="alunni-${sqIdx}">
          ${sq.alunni.map(function(nome, aIdx) {
            return `<div class="alunno-row">
              <span class="alunno-nome">${_esc(nome)}</span>
              <span class="alunno-tipo" style="color:${sq.tipo==='Merito'?'#fbbf24':'#a5b4fc'}">${sq.tipo}</span>
              <button class="btn btn-sm btn-outline" onclick="scaricaSingolo(${sqIdx},${aIdx},this)">📄 PDF</button>
            </div>`;
          }).join('')}
        </div>`;

      list.appendChild(block);
    });

    document.getElementById('squadrePanel').style.display = 'block';
    // Apre automaticamente la prima squadra
    toggleSquadra(0);
  }

  function toggleSquadra(idx) {
    const block = document.getElementById('sq-block-' + idx);
    block.classList.toggle('open');
  }

  // ===================== GENERAZIONE PDF =====================

  function getCampi() {
    return {
      nomeDS:        document.getElementById('nomeDS').value.trim() || 'Il Dirigente Scolastico',
      nomeRef:       document.getElementById('nomeRef').value.trim() || 'Il Referente',
      dataCerimonia: document.getElementById('dataCerimonia').value
        ? formatData(document.getElementById('dataCerimonia').value)
        : formatData(new Date().toISOString().split('T')[0]),
      annoScolastico: LOGIKRON_CONFIG.annoScolastico,
      edizioni:       LOGIKRON_CONFIG.totaleStorico.edizioni
    };
  }

  function formatData(isoDate) {
    const mesi = ['gennaio','febbraio','marzo','aprile','maggio','giugno',
                  'luglio','agosto','settembre','ottobre','novembre','dicembre'];
    const p = isoDate.split('-');
    return parseInt(p[2]) + ' ' + mesi[parseInt(p[1])-1] + ' ' + p[0];
  }

  function ordinale(n) {
    if (n === 1) return '1ª';
    if (n === 2) return '2ª';
    if (n === 3) return '3ª';
    return n + 'ª';
  }

  function scaricaSingolo(sqIdx, aIdx, btn) {
    const sq = _datiAttest[sqIdx];
    const nome = sq.alunni[aIdx];
    const orig = btn.textContent;
    btn.disabled = true; btn.textContent = '⏳';
    generaPDF(sq, nome)
      .then(function(doc) {
        doc.save(nome.replace(/\s+/g,'_') + '_attestato.pdf');
        btn.disabled = false; btn.textContent = orig;
      })
      .catch(function(e) {
        btn.disabled = false; btn.textContent = orig;
        toast('Errore PDF: ' + e.message);
      });
  }

  function scaricaSquadra(sqIdx) {
    const sq = _datiAttest[sqIdx];
    scaricaLista(sq.alunni.map(function(nome){ return {sq, nome}; }), 0);
  }

  async function scaricaTutti() {
    const lista = [];
    _datiAttest.forEach(function(sq) {
      sq.alunni.forEach(function(nome) { lista.push({sq, nome}); });
    });
    if (lista.length === 0) { toast('Nessun alunno trovato.'); return; }

    const btn = document.getElementById('btnTutti');
    btn.disabled = true;
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('progressBar').style.width = '0%';

    for (let i = 0; i < lista.length; i++) {
      document.getElementById('progressLabel').textContent =
        'Generazione ' + (i+1) + '/' + lista.length + ' — ' + lista[i].nome;
      document.getElementById('progressBar').style.width = Math.round((i/lista.length)*100) + '%';

      try {
        const doc = await generaPDF(lista[i].sq, lista[i].nome);
        doc.save(lista[i].nome.replace(/\s+/g,'_') + '_attestato.pdf');
      } catch(e) {
        console.error('Errore PDF per', lista[i].nome, e);
      }

      // Pausa tra un PDF e l'altro (evita di stallare il browser)
      await new Promise(function(r){ setTimeout(r, 300); });
    }

    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('progressLabel').textContent = '✅ ' + lista.length + ' PDF generati!';
    btn.disabled = false;
    setTimeout(function(){ document.getElementById('progressWrap').style.display = 'none'; }, 4000);
    toast('✅ Tutti i ' + lista.length + ' attestati scaricati!');
  }

  function scaricaLista(lista, i) {
    if (i >= lista.length) return;
    generaPDF(lista[i].sq, lista[i].nome)
      .then(function(doc){
        doc.save(lista[i].nome.replace(/\s+/g,'_') + '_attestato.pdf');
        setTimeout(function(){ scaricaLista(lista, i+1); }, 300);
      });
  }

  // ===================== GENERA SINGOLO PDF =====================

  async function generaPDF(sq, nomeAlunno) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    // A4 landscape: 297 × 210 mm

    const W = 297, H = 210;
    const campi = getCampi();

    // --- SFONDO ---
    if (_imgCache['sfondo']) {
      doc.addImage(_imgCache['sfondo'], 'PNG', 0, 0, W, H);
    } else {
      // Fallback: bordo semplice
      doc.setDrawColor(150, 120, 40);
      doc.setLineWidth(2);
      doc.rect(8, 8, W-16, H-16);
      doc.setLineWidth(0.5);
      doc.rect(11, 11, W-22, H-22);
    }

    // --- LOGO STATO ITALIANO ---
    if (_imgCache['logo-stato']) {
      doc.addImage(_imgCache['logo-stato'], 'PNG', 18, 14, 18, 22);
    }

    // --- LOGO LOGIKRON ---
    if (_imgCache['logo-logikron']) {
      doc.addImage(_imgCache['logo-logikron'], 'PNG', 214, 13, 64, 18);
    }

    // --- BADGE EDIZIONE (testo curvo simulato con box) ---
    const edStr = ordinale(campi.edizioni) + ' Edizione';
    doc.setFontSize(7.5);
    doc.setTextColor(100, 80, 20);
    doc.setFont('helvetica', 'bold');
    doc.text(edStr, W/2, 14, { align: 'center' });

    // --- TITOLO PRINCIPALE ---
    const titoloLinea1 = 'ATTESTATO DI';
    const titoloLinea2 = sq.tipo.toUpperCase();
    doc.setTextColor(40, 30, 10);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.text(titoloLinea1, W/2, 44, { align: 'center' });
    doc.setFontSize(28);
    doc.setTextColor(sq.tipo === 'Merito' ? '#7c3a00' : '#1e3a8a');
    if (sq.tipo === 'Merito') {
      doc.setTextColor(124, 58, 0);
    } else {
      doc.setTextColor(30, 58, 138);
    }
    doc.text(titoloLinea2, W/2, 58, { align: 'center' });

    // Linea decorativa sotto il titolo
    doc.setDrawColor(180, 150, 50);
    doc.setLineWidth(0.6);
    doc.line(80, 62, W-80, 62);

    // --- CORPO ---
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.setTextColor(50, 40, 20);
    doc.text('Si certifica che', W/2, 72, { align: 'center' });

    // Nome alunno - grande
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.setTextColor(20, 20, 20);
    doc.text(nomeAlunno, W/2, 84, { align: 'center' });

    // Linea sotto il nome
    doc.setDrawColor(180, 150, 50);
    doc.setLineWidth(0.4);
    const nomeW = doc.getTextWidth(nomeAlunno);
    doc.line(W/2 - nomeW/2 - 5, 87, W/2 + nomeW/2 + 5, 87);

    // Testo partecipazione
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.setTextColor(50, 40, 20);

    const ordineLabel = sq.ordine === 'primaria' ? 'Scuola Primaria' : 'Scuola Secondaria di I grado';
    const classeLabel = 'Classe ' + sq.classe + (sq.sezione ? ' sez. ' + sq.sezione : '');
    const istitutoLabel = sq.istituto + (sq.plesso && sq.plesso !== sq.istituto ? ' – ' + sq.plesso : '');

    doc.text('ha partecipato come membro della squadra', W/2, 96, { align: 'center' });

    doc.setFont('helvetica', 'bolditalic');
    doc.setFontSize(12.5);
    doc.text('"' + sq.squadra + '"', W/2, 105, { align: 'center' });

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.text(istitutoLabel + ' – ' + ordineLabel + ' – ' + classeLabel, W/2, 113, { align: 'center' });

    doc.setFont('helvetica', 'bold');
    doc.text('ai Giochi Matematici LogiKron – Anno Scolastico ' + campi.annoScolastico, W/2, 122, { align: 'center' });

    // --- ZONA BASSA ---

    // Timbro scuola
    if (_imgCache['timbro']) {
      doc.addImage(_imgCache['timbro'], 'PNG', 20, 148, 42, 42);
    }

    // Luogo e data
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9.5);
    doc.setTextColor(50, 40, 20);
    doc.text('Gottolengo, ' + campi.dataCerimonia, 155, 155);

    // Firma DS
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text('Il Dirigente Scolastico', 165, 162, { align: 'center' });
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text(campi.nomeDS, 165, 175, { align: 'center' });
    doc.setLineWidth(0.3);
    doc.setDrawColor(100, 80, 40);
    doc.line(138, 168, 192, 168);

    // Firma Referente
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(50, 40, 20);
    doc.text('Il Referente per la Matematica', 244, 162, { align: 'center' });
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text(campi.nomeRef, 244, 175, { align: 'center' });
    doc.setLineWidth(0.3);
    doc.line(216, 168, 272, 168);

    return doc;
  }

  // ===================== UTILS =====================

  function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function(){ t.remove(); }, 5000);
  }

  // Avvia se già loggato
  if (sessionStorage.getItem('lkAttestati') === 'true') { init(); }
</script>
